name: aprendia
description: Tutor IA para adultos mexicanos en rezago educativo — programa INEA/MEVyT
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  http: ^1.2.2
  hive_flutter: ^1.1.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.4
  intl: ^0.19.0
  audioplayers: ^6.1.0
  go_router: ^14.0.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  # hive_generator no es compatible con riverpod_generator en Dart 3.11
  # El adaptador se escribió manualmente en user_profile.g.dart

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/audio/
